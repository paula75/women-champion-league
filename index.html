<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum UWCL 2026 - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Inter:wght@400;600;800&display=swap');
        :root { --dark: #070b19; --cyan: #00d2ff; --magenta: #e8006e; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; background-attachment: fixed; }
        .teko-font { font-family: 'Teko', sans-serif; }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .card-container.collected .card-inner:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="glass sticky top-0 z-30 p-4 border-b border-white/10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl teko-font tracking-widest"><span class="text-white">ÁLBUM</span> <span class="text-[var(--cyan)]">UWCL</span></h1>
            <button onclick="openPack()" class="bg-gradient-to-r from-[var(--magenta)] to-pink-600 px-4 py-2 rounded-full font-bold teko-font text-lg shadow-lg hover:scale-105 transition">
                <i class="fas fa-box-open mr-2"></i> <span id="pack-count">5</span>
            </button>
        </div>
    </header>

    <nav class="max-w-4xl mx-auto py-6 px-4 flex items-center justify-between">
        <button onclick="prevTeam()" class="bg-white/10 hover:bg-white/20 p-3 rounded-full transition w-12 h-12">
            <i class="fas fa-chevron-left"></i>
        </button>
        
        <div class="text-center">
            <h2 id="team-name" class="teko-font text-4xl uppercase tracking-widest text-white leading-none">EQUIPO</h2>
            <p id="team-counter" class="text-[var(--cyan)] text-xs font-bold uppercase tracking-widest mt-1">0/7 Coleccionadas</p>
        </div>

        <button onclick="nextTeam()" class="bg-white/10 hover:bg-white/20 p-3 rounded-full transition w-12 h-12">
            <i class="fas fa-chevron-right"></i>
        </button>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>

    <script>
        // Configuración inicial
        const CARDS_PER_TEAM = 7;
        let collection = {}; 
        let packsAvailable = 5;
        let currentTeamIndex = 0;

        // Equipos
        const teamsData = [
            { id: 'ARS', name: "Arsenal WFC", c1: "#ef0107", c2: "#ffffff", border: "#9c824a" },
            { id: 'FCB', name: "FC Barcelona", c1: "#004d98", c2: "#a50044", border: "#edbb00" },
            { id: 'CHE', name: "Chelsea FC", c1: "#034694", c2: "#001489", border: "#ffffff" },
            { id: 'LYON', name: "Olympique Lyon", c1: "#ffffff", c2: "#da0027", border: "#0055a4" }
        ];

        // Jugadoras
        let playersDB = [
            { id: 1, name: "Beth Mead", team: "ARS", position: "Delantera", photo: "img/ars_mead.jpg" },
            { id: 2, name: "Caitlin Foord", team: "ARS", position: "Delantera", photo: "img/ars_foord.jpg" },
            { id: 3, name: "Stephanie Catley", team: "ARS", position: "Defensa", photo: "img/ars_catley.jpg" },
            { id: 4, name: "Alessia Russo", team: "ARS", position: "Delantera", photo: "img/ars_russo.jpeg" },
            { id: 5, name: "Katie McCabe", team: "ARS", position: "Medio", photo: "img/ars_mccabe.jpg" },
            { id: 6, name: "Leah Williamson", team: "ARS", position: "Medio", photo: "img/ars_williamson.jpg" },
            { id: 7, name: "Manu Zinsberger", team: "ARS", position: "Portera", photo: "img/ars_zinsberger.jpg" },
            { id: 8, name: "Mapi Leon", team: "FCB", position: "Defensa", photo: "img/bc_leon.jpeg" },
            { id: 9, name: "Alexia Putellas", team: "FCB", position: "Medio", photo: "img/bc_putellas.jpeg" },
            { id: 10, name: "Aitana Bonmatí", team: "FCB", position: "Medio", photo: "img/bc_aitana.jpg" },
            { id: 11, name: "Salma Paralluelo", team: "FCB", position: "Delantera", photo: "img/bc_paralluelo.jpeg" },
            { id: 12, name: "Cata Coll", team: "FCB", position: "Portera", photo: "img/bc_coll.jpeg" },
            { id: 13, name: "Caroline Graham", team: "FCB", position: "Delantera", photo: "img/bc_hansen.jpeg" },
            { id: 14, name: "Patricia Guijarro", team: "FCB", position: "Medio", photo: "img/bc_guijarro.jpeg" },
            { id: 15, name: "Sam Kerr", team: "CHE", position: "Delantera", photo: "img/che_kerr.jpeg" },
            { id: 16, name: "Keira Walsh", team: "CHE", position: "Medio", photo: "img/che_walsh.jpg" },
            { id: 17, name: "Niamh Charles", team: "CHE", position: "Delantera", photo: "img/che_charles.jpg" },
            { id: 18, name: "Veerle Buurman", team: "CHE", position: "Defensa", photo: "img/che_buurman.jpeg" },
            { id: 19, name: "Hannah Hampton", team: "CHE", position: "Portera", photo: "img/che_hampton.jpeg" },
            { id: 20, name: "Lauren James", team: "CHE", position: "Delantera", photo: "img/che_james.jpeg" },
            { id: 21, name: "Alyssa Thompson", team: "CHE", position: "Delantera", photo: "img/che_thompson.jpg" },
            { id: 22, name: "Ada Hegerberg", team: "LYON", position: "Defensa", photo: "img/lyon_hegerberg.jpeg" },
            { id: 23, name: "Christiane Endler", team: "LYON", position: "Portera", photo: "img/lyon_endler.jpeg" },
            { id: 24, name: "Tabitha Chawinga", team: "LYON", position: "Delantera", photo: "img/lyon_chawinga.jpeg" },
            { id: 25, name: "Kadidiatou Diani", team: "LYON", position: "Delantera", photo: "img/lyon_diani.jpeg" },
            { id: 26, name: "Ellie Carpenter", team: "LYON", position: "Defensa", photo: "img/lyon_carpenter.jpeg" },
            { id: 27, name: "Melchie Dumornay", team: "LYON", position: "Medio", photo: "img/lyon_dumornay.jpg" },
            { id: 28, name: "Lindsey Horan", team: "LYON", position: "Medio", photo: "img/lyon_horan.jpg" }

        ];

        const allPlayers = [...playersDB ];

        function renderCurrentPage() {
            const team = teamsData[currentTeamIndex];
            document.getElementById('team-name').innerText = team.name;
            const teamPlayers = playersDB.filter(p => p.team === team.id);
            const grid = document.getElementById('album-grid');
            
            grid.innerHTML = '';
            teamPlayers.forEach(p => {
                
                const isCollected = !!collection[p.id];

                grid.innerHTML += `
                    <div class="card-container ${isCollected ? 'collected' : ''}">
                        <div class="card-inner w-full aspect-[2.5/3.5] rounded-xl overflow-hidden border-2 ${isCollected ? 'border-[var(--cyan)] bg-slate-800' : 'border-dashed border-gray-600 bg-gray-900'}">
                            ${isCollected ? `
                                <img src="${p.photo}" class="w-full h-full object-cover">
                                <div 
                                class="absolute bottom-0 w-full bg-black/60 p-2 text-center text-m teko-font">
                                    ${p.name}</div>
                            ` : `
                                <div class="flex items-center justify-center h-full text-gray-600 font-bold">#${p.id}</div>
                            `}
                        </div>
                    </div>
                `;
            });
            document.getElementById('team-counter').innerText = `${teamPlayers.filter(p => collection[p.id]).length}/${CARDS_PER_TEAM} Coleccionadas`;
        }

        function nextTeam() { if(currentTeamIndex < teamsData.length - 1) { currentTeamIndex++; renderCurrentPage(); } }
        function prevTeam() { if(currentTeamIndex > 0) { currentTeamIndex--; renderCurrentPage(); } }
        
        function openPack() { 
            const newCards = [];
            
            for(let i = 0; i < 5; i++) {
                const random =
                    allPlayers[
                        Math.floor(Math.random() * allPlayers.length)
                    ];
                collection[random.id] =
                    (collection[random.id] || 0) + 1;
                newCards.push(random);
            }
            console.log("Nuevas cartas obtenidas:", newCards);
            localStorage.setItem(
                "collection",
                JSON.stringify(collection)
            );
            // Resta packs disponibles
            packsAvailable--; 
            document.getElementById('pack-count').innerText = packsAvailable;
            renderCurrentPage(); 
        }

        window.onload = renderCurrentPage;
    </script>
</body>
</html>
